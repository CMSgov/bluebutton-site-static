name: Build and Deploy Static Site to Akamai

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - test
          - staging
          - prod
      release_tag:
        description: Release tag to deploy (e.g. r33) — required for all manual deploys
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_ENV: ${{ inputs.environment || 'test' }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build (${{ inputs.environment || 'test' }})
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Require release tag for manual deploys
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag == ''
        run: |
          echo "::error::Release tag is required for all manual deployments"
          exit 1

      - uses: actions/checkout@v4

      - name: Checkout release tag
        if: inputs.release_tag != ''
        run: |
          git fetch --tags
          git -c advice.detachedHead=false checkout tags/${{ inputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          SITE_ENV: ${{ env.DEPLOY_ENV }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 3

      - name: Notify Slack on build failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then exit 0; fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [
                {
                  \"color\": \"danger\",
                  \"text\": \"failure - Build failed ENV:${{ env.DEPLOY_ENV }} TAG:${{ inputs.release_tag || github.ref_name }}\n${RUN_URL}\"
                }
              ]
            }"

  deploy:
    name: Deploy to Akamai (${{ inputs.environment || 'test' }})
    needs: build
    timeout-minutes: 30
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}
    environment: ${{ inputs.environment || 'test' }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist/

      - name: Create CloudWatch log group and stream
        run: |
          LOG_GROUP="/bb2/site-static/${{ env.DEPLOY_ENV }}/deploy"
          LOG_STREAM="deploy-${{ github.run_id }}-${{ github.run_attempt }}"
          aws logs create-log-group --log-group-name "$LOG_GROUP" 2>/dev/null || true
          aws logs create-log-stream --log-group-name "$LOG_GROUP" --log-stream-name "$LOG_STREAM" 2>/dev/null || true
          echo "LOG_GROUP=$LOG_GROUP" >> "$GITHUB_ENV"
          echo "LOG_STREAM=$LOG_STREAM" >> "$GITHUB_ENV"

      - name: Determine Akamai upload path
        id: akamai-path
        run: |
          case "${{ env.DEPLOY_ENV }}" in
            test)    echo "path=/1197010/test.static.bluebutton.cms.gov/" >> "$GITHUB_OUTPUT" ;;
            staging) echo "path=/1197010/staging.bluebutton.cms.gov/" >> "$GITHUB_OUTPUT" ;;
            prod)    echo "path=/1197010/bluebutton.cms.gov/" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AKAMAI_SCP_SSH_KEY }}" > ~/.ssh/akamai_key
          chmod 600 ~/.ssh/akamai_key
          cat > ~/.ssh/config <<'EOF'
          Host bluebuttoncms.rsync.upload.akamai.com
            HostKeyAlgorithms +ssh-dss
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/akamai_key
          EOF

      - name: Deploy to Akamai NetStorage
        run: |
          echo "::echo::off"
          rsync -av --delete \
            --exclude=/bbapi-static/ \
            -e "ssh" \
            ./dist/ \
            ${{ secrets.AKAMAI_SSH_USER }}@bluebuttoncms.rsync.upload.akamai.com:${{ steps.akamai-path.outputs.path }} > /tmp/rsync.log 2>&1

      - name: Push rsync log to CloudWatch
        if: always()
        run: |
          jq -R -s '
            split("\n") |
            map(select(length > 0)) |
            map({timestamp: (now * 1000 | floor), message: .})
          ' /tmp/rsync.log > /tmp/rsync_events.json
          aws logs put-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LOG_STREAM" \
            --log-events file:///tmp/rsync_events.json > /dev/null

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/akamai_key ~/.ssh/config

      - name: Push deploy summary to CloudWatch
        if: always()
        run: |
          TIMESTAMP=$(date +%s000)
          MESSAGE="DEPLOY ${{ job.status }} | repo=${{ github.repository }} env=${{ env.DEPLOY_ENV }} tag=${{ inputs.release_tag || github.ref_name }} target=${{ steps.akamai-path.outputs.path }} run=${{ github.run_id }} actor=${{ github.actor }}"
          aws logs put-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$LOG_STREAM" \
            --log-events "timestamp=${TIMESTAMP},message=${MESSAGE}"

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          if [[ "${{ job.status }}" == "success" ]]; then
            COLOR="good"
          else
            COLOR="danger"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [
                {
                  \"color\": \"${COLOR}\",
                  \"text\": \"${{ job.status }} - Deploy Akamai ENV:${{ env.DEPLOY_ENV }} TAG:${{ inputs.release_tag || github.ref_name }}\n${RUN_URL}\"
                }
              ]
            }"
