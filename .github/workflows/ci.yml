name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run typecheck

  spellcheck:
    name: Spell Check
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run spellcheck

  build:
    name: Build
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Build site
        run: npm run build
        env:
          SITE_ENV: test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 5

  linkcheck:
    name: Link Check
    needs: build
    runs-on:
      - codebuild-bb-test-site-static-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run lint:linkcheck
        env:
          SITE_ENV: test
