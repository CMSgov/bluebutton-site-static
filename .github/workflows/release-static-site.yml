name: Create Release

on:
  workflow_dispatch:
    inputs:
      commit_range:
        description: Optional commit range override (e.g. r91..r92) — leave blank to auto-detect since last tag
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release Tag
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch pull request refs
        run: git fetch origin '+refs/pull/*/head:refs/remotes/origin/pr/*'

      - name: Verify on master branch
        run: |
          CURRENT_BRANCH="${{ github.ref_name }}"
          if [[ "$CURRENT_BRANCH" != "master" ]]; then
            echo "::error::Release must be created from master branch. Current branch: $CURRENT_BRANCH"
            exit 1
          fi

      - name: Verify local and remote tags are in sync
        run: |
          LOCAL_TAGS="$(git tag | grep -o 'r[0-9]\{1,\}[-hotfix]*' | sort -u -V)"
          REMOTE_TAGS="$(git ls-remote --quiet --tags origin | grep -o 'r[0-9]\{1,\}[-hotfix]*' | sort -u -V)"
          if [[ "${LOCAL_TAGS}" != "${REMOTE_TAGS}" ]]; then
            echo "::error::Local tags do not match remote tags. Please reconcile before releasing."
            echo "Local tags:"
            echo "$LOCAL_TAGS"
            echo "Remote tags:"
            echo "$REMOTE_TAGS"
            exit 1
          fi
          echo "Local and remote tags are in sync"

      - name: Determine new release tag
        id: tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "r0")
          PREV_NUM=${PREV_TAG#r}
          NEW_NUM=$((PREV_NUM + 1))
          NEW_TAG="r${NEW_NUM}"
          echo "prev=$PREV_TAG" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "Previous: $PREV_TAG → New: $NEW_TAG"

      - name: Check for new commits
        run: |
          COMMIT_RANGE="${{ inputs.commit_range || format('{0}..HEAD', steps.tag.outputs.prev) }}"
          COMMIT_COUNT=$(git rev-list --count "$COMMIT_RANGE")
          if [[ "$COMMIT_COUNT" -eq 0 ]]; then
            echo "::error::No commits in range $COMMIT_RANGE, nothing to release"
            exit 1
          fi
          echo "$COMMIT_COUNT commits in range $COMMIT_RANGE"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG="${{ steps.tag.outputs.prev }}"
          NEW_TAG="${{ steps.tag.outputs.new }}"
          RELEASE_DATE="${{ steps.tag.outputs.date }}"
          COMMIT_RANGE="${{ inputs.commit_range || format('{0}..HEAD', steps.tag.outputs.prev) }}"

          # Build hash-to-PR map from ref names (mirrors manual script get_hash2pr_map)
          declare -A hash2pr
          commit_hash_refnames_regex="^([a-f0-9]{40})[[:blank:]]*(.*)"
          refnames_pr_id_regex="^\(.*/pr/([0-9]+).*\)"

          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            if [[ $line =~ $commit_hash_refnames_regex ]]; then
              hash=${BASH_REMATCH[1]}
              nmref=${BASH_REMATCH[2]}
              pr_link=""
              if [[ $nmref =~ $refnames_pr_id_regex ]]; then
                pr_link="(#${BASH_REMATCH[1]})"
              fi
              hash2pr["$hash"]="$pr_link"
            fi
          done < <(git log --pretty=format:'%H %d' ${COMMIT_RANGE})

          # Generate release history (mirrors manual script generate_release_history)
          commit_hash_subj_regex="^([a-f0-9]{40})[[:blank:]]+(.+)(\(\#[0-9]+\))?"
          rel_hist=""

          while IFS= read -r line; do
            line=$(echo "$line" | xargs)
            if [[ $line =~ $commit_hash_subj_regex ]]; then
              hash=${BASH_REMATCH[1]}
              subj=${BASH_REMATCH[2]}
              pr_link=${BASH_REMATCH[3]}
              release_entry="- ${subj}"
              if [ -z "${pr_link}" ]; then
                pr_link="${hash2pr[$hash]}"
                release_entry="- ${subj} ${pr_link}"
              fi
              rel_hist="${rel_hist}\n${release_entry}"
            fi
          done < <(git log --pretty=format:'%H %s' ${COMMIT_RANGE})

          if [[ -z "${rel_hist}" ]]; then
            echo "::error::No release history generated, nothing to release"
            exit 1
          fi

          # Escape any quotes
          rel_hist="${rel_hist//\"/\\\"}"

          # Build release body
          BODY="${NEW_TAG} - ${RELEASE_DATE}\n================\n${rel_hist}"

          echo -e "$BODY" > /tmp/release_notes.md

          echo "Generated release notes:"
          cat /tmp/release_notes.md

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: push-tag
        run: |
          NEW_TAG="${{ steps.tag.outputs.new }}"
          git tag -a "$NEW_TAG" -m "Blue Button Static Site release $NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag_pushed=true" >> "$GITHUB_OUTPUT"
          echo "Tag $NEW_TAG created and pushed"

      - name: Create GitHub release
        id: create-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.tag.outputs.new }}"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes-file /tmp/release_notes.md \
            --latest

          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/$NEW_TAG"

      - name: Rollback on failure
        if: failure() && steps.push-tag.outputs.tag_pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_TAG="${{ steps.tag.outputs.new }}"
          echo "::warning::Release failed, rolling back tag $NEW_TAG"

          # Delete the GitHub release if it was partially created
          gh release delete "$NEW_TAG" --yes 2>/dev/null || true

          # Delete remote tag
          echo "Deleting remote tag $NEW_TAG"
          git push -d origin "$NEW_TAG" || true

          # Delete local tag
          echo "Deleting local tag $NEW_TAG"
          git tag -d "$NEW_TAG" || true

          echo "::error::Rollback complete. Debug: check release notes below"
          if [[ -f /tmp/release_notes.md ]]; then
            echo "Release notes content:"
            cat /tmp/release_notes.md
          fi
