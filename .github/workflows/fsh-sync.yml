name: Generate JSON from BFD FSH Files

on:
  schedule:
    # Run on day 1 and day 15 of the month at 8:00 AM UTC
    - cron: '0 8 1,15 * *'
  workflow_dispatch:
  push:

jobs:
  generate-json:
    runs-on: ubuntu-latest

    steps:
    # Setup Node
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # Verify Node/npm was installed
    - name: Verify Node Installation
      run:  |
        node --version
        npm --version

    # Install Sushi
    - name: Install Sushi
      run:  |
        npm install -g fsh-sushi fhirpath
        sushi --version

    # Checkout BFD Repo (public repo)
    - name: Checkout BFD Repo
      uses: actions/checkout@v4
      with:
        repository: CMSgov/beneficiary-fhir-data
        path: beneficiary-fhir-data

    # Generate JSON from FSH
    - name: Generate JSON
      run: |
        cd beneficiary-fhir-data/apps/bfd-model-idr/sushi
        sushi build

    # Confirm JSON Output
    - name: Verify generated JSON
      run: |
        echo "Checking output directory"
        ls beneficiary-fhir-data/apps/bfd-model-idr/sushi/fsh-generated/resources

    # Checkout BB Static Site Repo (public repo)
    - name: Checkout BB Static Site Repo
      uses: actions/checkout@v4
      with:
        path: bluebutton-site-static
    
    # Create a new branch name for the changes
    - name: Generate a branch name
      id: branch
      run: |
        BRANCH_NAME="json-update-$(date +%Y%m%d%H%M%S)"
        echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
    
    # Rename the CodeSystem JSON files to remove the prefix and copy them to the 
    # appropriate location in the bluebutton-site-static repo
    - name: Copy + rename JSON CodeSystem files
      run:  |
        for file in beneficiary-fhir-data/apps/bfd-model-idr/sushi/fsh-generated/resources/CodeSystem-*.json; do
          filename=$(basename "$file")
          new_filename="${filename#CodeSystem-}"
          echo "Copying $file to bluebutton-site-static/src/content/fhir/CodeSystem/$new_filename"
          cp "$file" "bluebutton-site-static/src/content/fhir/CodeSystem/$new_filename"
        done

    # Rename the StructureDefinition JSON files to remove the prefix and copy them to the 
    # appropriate location in the bluebutton-site-static repo
    - name: Copy + rename JSON Structure Definition files
      run:  |
        for file in beneficiary-fhir-data/apps/bfd-model-idr/sushi/fsh-generated/resources/StructureDefinition-*.json; do
          filename=$(basename "$file")
          new_filename="${filename#StructureDefinition-}"
          echo "Copying $file to bluebutton-site-static/src/content/fhir/StructureDefinition/$new_filename"
          cp "$file" "bluebutton-site-static/src/content/fhir/StructureDefinition/$new_filename"
        done

    # See if there were any changes to the JSON files that were copied over
    - name: Check for changes
      id: check-for-changes
      run: |
        cd bluebutton-site-static
        git add .
        if git diff --cached --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected, skipping commit and push"
        else
          echo "Changes detected, committing and pushing"
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    # Commit and push changes if there were any
    - name: Commit and Push Changes
      if: steps.check-for-changes.outputs.changed == 'true'
      run: |
        cd bluebutton-site-static
        git checkout -B ${{ steps.branch.outputs.branch_name }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Update JSON from BFD FSH files"
        git push --set-upstream origin ${{ steps.branch.outputs.branch_name }}
        sleep 5 # Wait for the push to complete before creating the PR
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Create a PR if there were changes
    - name: Create Pull Request
      if: steps.check-for-changes.outputs.changed == 'true'
      run:  |
        cd bluebutton-site-static
        gh pr create \
          --title "Update JSON from BFD FSH files" \
          --body "This PR updates the JSON files generated from the BFD FSH files. Please review and merge if everything looks good." \
          --base master \
          --head ${{ steps.branch.outputs.branch_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}